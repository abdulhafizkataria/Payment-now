<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pay Now</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff00cc, #3333ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      color: #ff00cc;
    }

    .qr img {
      width: 100%;
      border-radius: 10px;
      margin: 15px 0;
    }

    .btn {
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      color: white;
    }

    .done {
      background: red;
    }

    .download {
      background: black;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 280px;
    }

    .modal-box h3 {
      color: red;
    }

    .close-btn {
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Pay Now</h2>
    <p>Scan QR and complete your payment</p>

    <div class="qr">
      <img id="qrImage" src="https://i.ibb.co/GQ8Yzw1s/20260310-134821.jpg">
    </div>

    <button class="btn done" id="payBtn">
      Payment Done
    </button>

    <button class="btn download" id="downloadBtn">
      Download QR
    </button>
  </div>

  <!-- Modal -->
  <div id="failModal" class="modal">
    <div class="modal-box">
      <h3>Payment Failed</h3>
      <p>No payment detected. Please complete your payment first.</p>
      <button class="close-btn" id="closeBtn">OK</button>
    </div>
  </div>

  <script>
    // Wait until page fully loads
    document.addEventListener("DOMContentLoaded", function() {

      document.getElementById("payBtn").addEventListener("click", function() {
        document.getElementById("failModal").style.display = "flex";
      });

      document.getElementById("closeBtn").addEventListener("click", function() {
        document.getElementById("failModal").style.display = "none";
      });

      document.getElementById("downloadBtn").addEventListener("click", function() {
        const img = document.getElementById("qrImage").src;
        const link = document.createElement("a");
        link.href = img;
        link.download = "payment-qr.jpg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });

    });
  </script>

</body>
</html>
