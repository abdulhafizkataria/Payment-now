<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pay Now</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff00cc, #3333ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      color: #ff00cc;
    }

    .qr img {
      width: 100%;
      border-radius: 10px;
      margin: 15px 0;
    }

    .btn {
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      color: white;
    }

    .done {
      background: red;
    }

    .download {
      background: black;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 280px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from {transform: scale(0.7); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    .modal-box h3 {
      color: red;
      margin-bottom: 10px;
    }

    .modal-box p {
      font-size: 14px;
      color: #444;
    }

    .close-btn {
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: red;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

  </style>
</head>

<body>

  <div class="box">
    <h2>Pay Now</h2>
    <p>Scan QR and complete payment</p>

    <div class="qr">
      <img id="qrImage" src="https://i.ibb.co/GQ8Yzw1s/20260310-134821.jpg">
    </div>

    <button class="btn done" onclick="showFailModal()">
      Payment Done
    </button>

    <button class="btn download" onclick="downloadQR()">
      Download QR
    </button>
  </div>

  <!-- Modal -->
  <div id="failModal" class="modal">
    <div class="modal-box">
      <h3>Payment Failed</h3>
      <p>No payment detected. Please complete your payment before proceeding.</p>
      <button class="close-btn" onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    function showFailModal() {
      document.getElementById("failModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("failModal").style.display = "none";
    }

    function downloadQR() {
      const link = document.createElement('a');
      link.href = document.getElementById('qrImage').src;
      link.download = 'payment-qr.jpg';
      link.click();
    }
  <script>
  function showFailModal() {
    document.getElementById("failModal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("failModal").style.display = "none";
  }

  function downloadQR() {
    const img = document.getElementById("qrImage").src;
    const link = document.createElement("a");
    link.href = img;
    link.download = "payment-qr.jpg";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>
</body>
</html>
